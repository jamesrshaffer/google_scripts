<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Gmail Cleaner — Domains</title>
<style>
  body { font-family: Arial, sans-serif; font-size: 14px; color: #222; margin: 24px; }
  h1 { color: #1a73e8; }
  .back { font-size: 13px; margin-bottom: 16px; }
  .back a { color: #1a73e8; text-decoration: none; }
  .back a:hover { text-decoration: underline; }
  .summary { margin-bottom: 16px; }
  .summary span { margin-right: 24px; font-weight: bold; }
  table { border-collapse: collapse; width: 100%; max-width: 900px; }
  th { background: #1a73e8; color: white; padding: 8px 12px; text-align: left; }
  th.num { text-align: right; }
  td { padding: 6px 12px; border-bottom: 1px solid #eee; }
  td.num { text-align: right; }
  tr:hover { background: #f5f8ff; }
  .btn {
    margin-top: 16px; padding: 10px 28px; font-size: 15px;
    background: #1a73e8; color: white; border: none;
    border-radius: 4px; cursor: pointer;
  }
  .btn:hover { background: #1557b0; }
  .btn-danger { background: #d93025; }
  .btn-danger:hover { background: #a50e0e; }
  #results { margin-top: 16px; padding: 12px; background: #e8f5e9; border-radius: 4px; display: none; }
  #error { margin-top: 16px; padding: 12px; background: #fce8e6; border-radius: 4px; display: none; }
  .controls { margin-bottom: 12px; }
  .controls button { margin-right: 8px; padding: 4px 12px; cursor: pointer; }
  #empty { margin-top: 32px; font-size: 16px; color: #666; display: none; }
</style>
</head>
<body>

<div class="back"><a href="index.html">← Back</a></div>
<h1>Review Domains</h1>
<div class="summary" id="summary">Loading...</div>

<div class="controls">
  <button onclick="selectAll()">Select All</button>
  <button onclick="selectNone()">Select None</button>
</div>

<form id="domainForm">
<table>
  <thead>
    <tr>
      <th style="width:32px">Keep</th>
      <th>Domain</th>
      <th class="num">Total</th>
      <th class="num">Flagged</th>
      <th class="num">Trashed</th>
      <th class="num">Remaining</th>
    </tr>
  </thead>
  <tbody id="domainTable">
    <tr><td colspan="6">Loading...</td></tr>
  </tbody>
</table>

<br>
<button type="button" class="btn btn-danger" onclick="process()" id="actionBtn" style="display:none">
  🗑 Protect Checked &amp; Flag Rest
</button>
</form>

<div id="empty">✅ All domains have been reviewed. Nothing left to action.</div>
<div id="results"></div>
<div id="error"></div>

<script>
// API key stored in sessionStorage — prompted once per browser session, never hardcoded
function getKey() {
  let key = sessionStorage.getItem('gmailclean_key');
  if (!key) {
    key = prompt('Enter API key:');
    if (!key) throw new Error('API key required');
    sessionStorage.setItem('gmailclean_key', key);
  }
  return key;
}

function makeHeaders() {
  return {
    'Content-Type': 'application/json',
    'X-API-Key': getKey()
  };
}

let allDomains = [];

async function load() {
  document.getElementById('results').style.display = 'none';
  try {
    const r = await fetch('/stats', { headers: makeHeaders() });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const t = data.totals;

    document.getElementById('summary').innerHTML =
      `<span>In DB: ${Number(t.total_messages).toLocaleString()}</span>` +
      `<span>Flagged: ${Number(t.total_flagged).toLocaleString()}</span>` +
      `<span>Trashed: ${Number(t.total_trashed).toLocaleString()}</span>` +
      `<span>Domains: ${Number(t.total_domains).toLocaleString()}</span>`;

    allDomains = data.domains;
    const tbody = document.getElementById('domainTable');
    tbody.innerHTML = '';

    if (allDomains.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="color:#666;padding:16px">No unreviewed domains remaining.</td></tr>';
      document.getElementById('actionBtn').style.display = 'none';
      document.getElementById('empty').style.display = 'block';
      return;
    }

    document.getElementById('actionBtn').style.display = 'inline-block';
    document.getElementById('empty').style.display = 'none';

    for (const d of allDomains) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align:center">
          <input type="checkbox" name="protect" value="${d.sender_domain}">
        </td>
        <td>${d.sender_domain}</td>
        <td class="num">${d.total}</td>
        <td class="num">${d.flagged}</td>
        <td class="num">${d.trashed}</td>
        <td class="num">${d.remaining}</td>
      `;
      tbody.appendChild(tr);
    }
  } catch(e) {
    document.getElementById('domainTable').innerHTML =
      `<tr><td colspan="6" style="color:red">Error loading data: ${e.message}</td></tr>`;
  }
}

function selectAll() {
  document.querySelectorAll('input[name=protect]').forEach(cb => cb.checked = true);
}

function selectNone() {
  document.querySelectorAll('input[name=protect]').forEach(cb => cb.checked = false);
}

async function process() {
  const checked = [...document.querySelectorAll('input[name=protect]:checked')]
    .map(cb => cb.value);
  const checkedSet = new Set(checked);
  const toFlag = allDomains.map(d => d.sender_domain).filter(d => !checkedSet.has(d));

  if (toFlag.length === 0) {
    alert('No domains to flag — all are checked as protected.');
    return;
  }

  try {
    const hdrs = makeHeaders();
    if (checked.length > 0) {
      await fetch('/protect', { method: 'POST', headers: hdrs, body: JSON.stringify(checked) });
    }

    const flagResp = await fetch('/flag-domains', {
      method: 'POST', headers: hdrs, body: JSON.stringify(toFlag)
    });
    if (!flagResp.ok) throw new Error('HTTP ' + flagResp.status);
    const flagData = await flagResp.json();

    const results = document.getElementById('results');
    results.style.display = 'block';
    results.innerHTML =
      `✅ Done! Protected: <b>${checked.length}</b> domain(s). ` +
      `Flagged for deletion: <b>${flagData.flagged}</b> message(s) across <b>${toFlag.length}</b> domain(s). ` +
      `<br>Run <b>trashFlagged()</b> in Apps Script to trash them.`;

    await load();
  } catch(e) {
    const err = document.getElementById('error');
    err.style.display = 'block';
    err.innerHTML = `Error: ${e.message}`;
  }
}

load();
</script>
</body>
</html>
